name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/

      - name: Run tests
        run: pytest -v

      - name: Run golden eval
        env:
          EVAL_SAMPLES: "1"
          EVAL_CONCURRENCY: "1"
          EVAL_TEMPERATURE: "0.0"
          REVIEW_MAX_ITERATIONS: "4"
          TOKEN_BUDGET: "48000"
          PROMPT_INPUT_TOKEN_BUDGET: "48000"
        run: |
          python -m eval.run eval --suite golden --output-json eval/outputs/ci_report.json

      - name: Enforce eval gate
        run: |
          python -m eval.gate --report eval/outputs/ci_report.json --schema-validity-min 1.0 --hit-rate-min 0.0 --false-positive-rate-max 0.5

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: |
            eval/outputs/ci_report.json
            eval/outputs/*_human_review.md
            eval/outputs/event_logs
