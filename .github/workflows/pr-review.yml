name: PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review-pr:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check review secrets
        id: review-secrets
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "### PR Review skipped"
              echo ""
              echo "OPENAI_API_KEY is not configured for this run."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.review-secrets.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate PR diff
        if: steps.review-secrets.outputs.available == 'true'
        shell: bash
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff --unified=3 "origin/${{ github.event.pull_request.base.ref }}"...HEAD > pr.diff

      - name: Run structured review
        if: steps.review-secrets.outputs.available == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REVIEW_MODEL_NAME: ${{ vars.MODEL_NAME }}
        run: |
          if [ -n "${REVIEW_MODEL_NAME}" ]; then
            python cli.py --model "${REVIEW_MODEL_NAME}" review . --diff-file pr.diff --json > review.json
          else
            python cli.py review . --diff-file pr.diff --json > review.json
          fi

      - name: Render PR comment
        if: steps.review-secrets.outputs.available == 'true'
        shell: bash
        run: |
          python scripts/render_pr_review.py \
            --input review.json \
            --output review-comment.md \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --commit-sha "${{ github.sha }}"

      - name: Upload review artifacts
        if: steps.review-secrets.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-artifacts
          path: |
            pr.diff
            review.json
            review-comment.md

      - name: Upsert PR comment
        if: steps.review-secrets.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- cr-debug-agent:pr-review -->";
            const body = fs.readFileSync("review-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              typeof comment.body === "string" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
