[flake8]
max-line-length = 120
exclude = .git,__pycache__,build,dist,venv,.venv
per-file-ignores =
    __init__.py:F401

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
